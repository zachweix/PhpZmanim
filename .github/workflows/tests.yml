name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php }} - Carbon ${{ matrix.carbon }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        carbon: ['^2.0', '^3.0']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Pin Carbon ${{ matrix.carbon }}
        run: composer require "nesbot/carbon:${{ matrix.carbon }}" --no-interaction --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit tests
